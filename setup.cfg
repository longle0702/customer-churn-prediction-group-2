[flake8]
max-line-length = 100
exclude =
    .git,
    __pycache__,
    .venv,
    venv,
    docs/_build,
    *.egg-info,
    dist,
    build
per-file-ignores =
    # Allow unused imports in __init__ files (re-exported symbols)
    __init__.py: F401
ignore =
    # W503 – line break before binary operator (conflicts with black)
    W503,
    # E203 – whitespace before ':' (conflicts with black slice formatting)
    E203
